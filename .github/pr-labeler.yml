# Configuration for actions/labeler (PR auto-labeling by changed files).
# Syntax: https://github.com/actions/labeler#configuration

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/actions/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "**/package.json"
          - "**/package-lock.json"
          - "**/pnpm-lock.yaml"
          - "**/yarn.lock"
          - "**/pyproject.toml"
          - "**/uv.lock"
          - "**/poetry.lock"
          - "**/requirements*.txt"
          - "**/Pipfile"
          - "**/Pipfile.lock"
          - "**/go.mod"
          - "**/go.sum"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - "**/Gemfile"
          - "**/Gemfile.lock"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/test/**"
          - "**/tests/**"
          - "**/*_test.go"
          - "**/*.test.*"
          - "**/*.spec.*"
          - "**/test_*.py"

terraform:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.tf"
          - "**/*.tfvars"
