name: triage

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions: {}

jobs:
  issue-labeler:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: github/issue-labeler@v3.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/issue-labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 1
          sync-labels: 1

  pr-labeler:
    if: github.event_name == 'pull_request_target' && github.event.action != 'edited'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/pr-labeler.yml
          sync-labels: true

  request-info:
    if: github.event.action == 'opened' || github.event.action == 'edited'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: tomdewildt/request-info@v1.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  first-interaction:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue here! A maintainer will take a
            look as soon as possible. In the meantime, double-check that the
            issue follows the template, it makes triage much faster.
          pr-message: >
            Thanks for your first pull request! A maintainer will review it as
            soon as possible. Make sure CI is green and the PR description
            explains the change and links any related issue.
